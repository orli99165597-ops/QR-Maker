<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>QR 코드 생성기</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  background: #f5f6fa;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 16px 60px;
  color: #1a1a2e;
}
header { text-align: center; margin-bottom: 36px; }
header .logo { display:inline-flex; align-items:center; gap:10px; margin-bottom:8px; }
header h1 { font-size:26px; font-weight:700; letter-spacing:-0.5px; }
header p { font-size:14px; color:#888; margin-top:4px; }
.card {
  background:#fff;
  border-radius:20px;
  padding:32px;
  width:100%;
  max-width:500px;
  box-shadow:0 4px 24px rgba(0,0,0,0.07);
}
.tabs {
  display:flex; gap:8px; margin-bottom:24px;
  background:#f0f1f5; border-radius:12px; padding:4px;
}
.tab-btn {
  flex:1; padding:9px 0; font-size:13px; font-weight:500;
  border:none; border-radius:9px; cursor:pointer;
  background:transparent; color:#888; transition:all 0.18s;
  display:flex; align-items:center; justify-content:center; gap:5px;
}
.tab-btn.active {
  background:#fff; color:#4f46e5;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}
.tab-btn svg { width:15px; height:15px; }
.field { margin-bottom:14px; }
label.field-label {
  display:block; font-size:12px; font-weight:600;
  color:#555; margin-bottom:6px; text-transform:uppercase; letter-spacing:0.3px;
}
input[type="text"],input[type="url"],input[type="email"],textarea {
  width:100%; padding:11px 14px; font-size:14px;
  border:1.5px solid #e5e7eb; border-radius:10px;
  outline:none; transition:border-color 0.15s;
  color:#1a1a2e; background:#fff; font-family:inherit;
}
input:focus,textarea:focus { border-color:#4f46e5; }
textarea { resize:vertical; min-height:72px; }
.controls-row {
  display:flex; gap:16px; align-items:center;
  margin-bottom:20px; flex-wrap:wrap;
}
.control-group {
  display:flex; align-items:center; gap:8px;
  flex:1; min-width:180px;
}
.control-group label { font-size:12px; color:#888; white-space:nowrap; font-weight:500; }
input[type="range"] { flex:1; accent-color:#4f46e5; }
.range-val { font-size:12px; font-weight:600; color:#4f46e5; min-width:36px; text-align:right; }
input[type="color"] {
  width:34px; height:34px; border:1.5px solid #e5e7eb;
  border-radius:8px; cursor:pointer; padding:2px; background:#fff;
}
.generate-btn {
  width:100%; padding:14px; font-size:15px; font-weight:700;
  border:none; border-radius:12px;
  background:linear-gradient(160deg,#e8ecf0 0%,#c8cdd6 20%,#f5f7fa 45%,#ffffff 50%,#d0d5dd 60%,#9aa3b0 80%,#b8bec8 100%);border:1px solid #a0a8b5;box-shadow:0 2px 8px rgba(0,0,0,0.18),inset 0 1px 0 rgba(255,255,255,0.7),inset 0 -1px 0 rgba(0,0,0,0.1);
  color:#2a2a2a; cursor:pointer; text-shadow:0 1px 1px rgba(255,255,255,0.6); transition:opacity 0.15s,transform 0.1s;
}
.generate-btn:hover { opacity:0.92; }
.generate-btn:active { transform:scale(0.98); }
.result-card {
  margin-top:24px; background:#f8f7ff;
  border:1.5px solid #e0ddff; border-radius:16px;
  padding:28px 24px 20px; text-align:center; display:none;
}
.result-card.show { display:block; }
#qr-canvas { border-radius:8px; display:block; margin:0 auto 14px; }
.qr-label { font-size:11px; color:#aaa; margin-bottom:16px; word-break:break-all; line-height:1.5; }
.action-row { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; }
.action-btn {
  padding:9px 18px; font-size:13px; font-weight:600;
  border-radius:10px; cursor:pointer;
  border:1.5px solid #d1cfff; background:#fff; color:#4f46e5;
  transition:background 0.12s; display:flex; align-items:center; gap:5px;
}
.action-btn:hover { background:#f0eeff; }
.action-btn svg { width:14px; height:14px; }
.error-msg {
  display:none; margin-top:12px; padding:10px 14px;
  background:#fff0f0; border:1px solid #fca5a5;
  border-radius:10px; font-size:13px; color:#dc2626;
}
.error-msg.show { display:block; }
footer { margin-top:32px; font-size:12px; color:#bbb; }
@media(max-width:480px){ .card{padding:22px 18px;} header h1{font-size:22px;} }
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
      <rect width="36" height="36" rx="10" fill="#4f46e5"/>
      <rect x="7" y="7" width="9" height="9" rx="1.5" fill="white"/>
      <rect x="9" y="9" width="5" height="5" rx="0.5" fill="#4f46e5"/>
      <rect x="20" y="7" width="9" height="9" rx="1.5" fill="white"/>
      <rect x="22" y="9" width="5" height="5" rx="0.5" fill="#4f46e5"/>
      <rect x="7" y="20" width="9" height="9" rx="1.5" fill="white"/>
      <rect x="9" y="22" width="5" height="5" rx="0.5" fill="#4f46e5"/>
      <rect x="20" y="20" width="4" height="4" rx="0.5" fill="white"/>
      <rect x="25" y="20" width="4" height="4" rx="0.5" fill="white"/>
      <rect x="20" y="25" width="4" height="4" rx="0.5" fill="white"/>
      <rect x="25" y="25" width="4" height="4" rx="0.5" fill="white"/>
    </svg>
    <h1>QR 생성기</h1>
  </div>
  <p>URL · 텍스트 · 이메일을 QR 코드로 변환합니다</p>
</header>

<div class="card">
  <div class="tabs">
    <button class="tab-btn active" onclick="setType('url')" id="btn-url">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      URL
    </button>
    <button class="tab-btn" onclick="setType('text')" id="btn-text">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
      텍스트
    </button>
    <button class="tab-btn" onclick="setType('email')" id="btn-email">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
      이메일
    </button>
  </div>

  <div id="input-area">
    <div class="field">
      <label class="field-label" id="main-label">웹 주소</label>
      <input id="main-input" type="url" placeholder="https://example.com" />
    </div>
  </div>
  <div id="extra-inputs"></div>

  <div class="controls-row">
    <div class="control-group">
      <label>크기</label>
      <input type="range" id="size-range" min="150" max="400" value="220" step="10"
        oninput="document.getElementById('size-out').textContent=this.value+'px'" />
      <span class="range-val" id="size-out">220px</span>
    </div>
    <div class="control-group" style="flex:0;min-width:auto;">
      <label>색상</label>
      <input type="color" id="qr-color" value="#1a1a2e" />
    </div>
  </div>

  <button class="generate-btn" onclick="generateQR()">QR 코드 만들기</button>
  <div class="error-msg" id="error-msg"></div>

  <div class="result-card" id="result-card">
    <canvas id="qr-canvas"></canvas>
    <div class="qr-label" id="qr-label"></div>
    <div class="action-row">
      <button class="action-btn" onclick="downloadQR()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        PNG 저장
      </button>
      <button class="action-btn" onclick="copyQR()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        이미지 복사
      </button>
    </div>
  </div>
</div>

<footer>© 디지털 오르리 · QR 생성기</footer>

QRCode.prototype={addData:function(d){this.dataList.push({mode:4,data:d});this.dataCache=null;},isDark:function(r,c){if(r<0||this.moduleCount<=r||c<0||this.moduleCount<=c)throw new Error(r+","+c);return this.modules[r][c];},getModuleCount:function(){return this.moduleCount;},make:function(){this.makeImpl(false,this.getBestMaskPattern());},makeImpl:function(t,m){this.moduleCount=this.typeNumber*4+17;this.modules=new Array(this.moduleCount);for(var r=0;r<this.moduleCount;r++){this.modules[r]=new Array(this.moduleCount);for(var c=0;c<this.moduleCount;c++)this.modules[r][c]=null;}this.setupPositionProbePattern(0,0);this.setupPositionProbePattern(this.moduleCount-7,0);this.setupPositionProbePattern(0,this.moduleCount-7);this.setupPositionAdjustPattern();this.setupTimingPattern();this.setupTypeInfo(t,m);if(this.typeNumber>=7)this.setupTypeNumber(t);if(this.dataCache==null)this.dataCache=QRCode.createData(this.typeNumber,this.errorCorrectLevel,this.dataList);this.mapData(this.dataCache,m);},
setupPositionProbePattern:function(r,c){for(var i=-1;i<=7;i++){if(r+i<=-1||this.moduleCount<=r+i)continue;for(var j=-1;j<=7;j++){if(c+j<=-1||this.moduleCount<=c+j)continue;this.modules[r+i][c+j]=((0<=i&&i<=6&&(j==0||j==6))||(0<=j&&j<=6&&(i==0||i==6))||(2<=i&&i<=4&&2<=j&&j<=4));}}},
getBestMaskPattern:function(){var mp=0,ml=0;for(var p=0;p<8;p++){this.makeImpl(true,p);var l=QRUtil.getLostPoint(this);if(p==0||ml>l){ml=l;mp=p;}}return mp;},
setupTimingPattern:function(){for(var r=8;r<this.moduleCount-8;r++){if(this.modules[r][6]!=null)continue;this.modules[r][6]=(r%2==0);}for(var c=8;c<this.moduleCount-8;c++){if(this.modules[6][c]!=null)continue;this.modules[6][c]=(c%2==0);}},
setupPositionAdjustPattern:function(){var pos=QRUtil.getPatternPosition(this.typeNumber);for(var i=0;i<pos.length;i++){for(var j=0;j<pos.length;j++){var r=pos[i],c=pos[j];if(this.modules[r][c]!=null)continue;for(var ri=-2;ri<=2;ri++){for(var ci=-2;ci<=2;ci++)this.modules[r+ri][c+ci]=(ri==-2||ri==2||ci==-2||ci==2||(ri==0&&ci==0));}};}},
setupTypeNumber:function(t){var bits=QRUtil.getBCHTypeNumber(this.typeNumber);for(var i=0;i<18;i++){var m=(!t&&((bits>>i)&1)==1);this.modules[Math.floor(i/3)][i%3+this.moduleCount-8-3]=m;}for(var i=0;i<18;i++){var m=(!t&&((bits>>i)&1)==1);this.modules[i%3+this.moduleCount-8-3][Math.floor(i/3)]=m;}},
setupTypeInfo:function(t,m){var data=(this.errorCorrectLevel<<3)|m,bits=QRUtil.getBCHTypeInfo(data);for(var i=0;i<15;i++){var md=(!t&&((bits>>i)&1)==1);if(i<6)this.modules[i][8]=md;else if(i<8)this.modules[i+1][8]=md;else this.modules[this.moduleCount-15+i][8]=md;}for(var i=0;i<15;i++){var md=(!t&&((bits>>i)&1)==1);if(i<8)this.modules[8][this.moduleCount-i-1]=md;else if(i<9)this.modules[8][15-i-1+1]=md;else this.modules[8][15-i-1]=md;}this.modules[this.moduleCount-8][8]=!t;},
mapData:function(d,m){var inc=-1,row=this.moduleCount-1,bitIndex=7,byteIndex=0;for(var col=this.moduleCount-1;col>0;col-=2){if(col==6)col--;while(true){for(var c=0;c<2;c++){if(this.modules[row][col-c]==null){var dk=false;if(byteIndex<d.length)dk=((d[byteIndex]>>bitIndex)&1)==1;if(QRUtil.getMask(m,row,col-c))dk=!dk;this.modules[row][col-c]=dk;bitIndex--;if(bitIndex==-1){byteIndex++;bitIndex=7;}}}row+=inc;if(row<0||this.moduleCount<=row){row-=inc;inc=-inc;break;}}}},
};
QRCode.PAD0=0xEC;QRCode.PAD1=0x11;
QRCode.createData=function(t,e,dl){var rsb=QRRSBlock.getRSBlocks(t,e),buf=new QRBitBuffer();for(var i=0;i<dl.length;i++){var d=dl[i];buf.put(d.mode,4);buf.put(d.data.length,QRUtil.getLengthInBits(d.mode,t));for(var j=0;j<d.data.length;j++){buf.put(d.data.charCodeAt(j),8);}}var ttd=0;for(var i=0;i<rsb.length;i++)ttd+=rsb[i].dataCount;if(buf.getLengthInBits()>ttd*8)throw new Error("code length overflow");if(buf.getLengthInBits()+4<=ttd*8)buf.put(0,4);while(buf.getLengthInBits()%8!=0)buf.putBit(false);while(true){if(buf.getLengthInBits()>=ttd*8)break;buf.put(QRCode.PAD0,8);if(buf.getLengthInBits()>=ttd*8)break;buf.put(QRCode.PAD1,8);}return QRCode.createBytes(buf,rsb);};
QRCode.createBytes=function(buf,rsb){var offset=0,maxDcCount=0,maxEcCount=0,dcdata=new Array(rsb.length),ecdata=new Array(rsb.length);for(var r=0;r<rsb.length;r++){var dcCount=rsb[r].dataCount,ecCount=rsb[r].totalCount-dcCount;maxDcCount=Math.max(maxDcCount,dcCount);maxEcCount=Math.max(maxEcCount,ecCount);dcdata[r]=new Array(dcCount);for(var i=0;i<dcdata[r].length;i++)dcdata[r][i]=0xff&buf.buffer[i+offset];offset+=dcCount;var rsPoly=QRUtil.getErrorCorrectPolynomial(ecCount),rawPoly=new QRPolynomial(dcdata[r],rsPoly.getLength()-1),modPoly=rawPoly.mod(rsPoly);ecdata[r]=new Array(rsPoly.getLength()-1);for(var i=0;i<ecdata[r].length;i++){var mi=i+modPoly.getLength()-ecdata[r].length;ecdata[r][i]=(mi>=0)?modPoly.get(mi):0;}}var ttd=0;for(var i=0;i<rsb.length;i++)ttd+=rsb[i].totalCount;var data=new Array(ttd),idx=0;for(var i=0;i<maxDcCount;i++)for(var r=0;r<rsb.length;r++)if(i<dcdata[r].length)data[idx++]=dcdata[r][i];for(var i=0;i<maxEcCount;i++)for(var r=0;r<rsb.length;r++)if(i<ecdata[r].length)data[idx++]=ecdata[r][i];return data;};

/* ── 앱 로직 ── */
var currentType='url', qrData=null;

function setType(t){
  currentType=t;
  ['url','text','email'].forEach(function(x){
    document.getElementById('btn-'+x).classList.toggle('active',x===t);
  });
  var mi=document.getElementById('main-input');
  var ex=document.getElementById('extra-inputs');
  var lb=document.getElementById('main-label');
  ex.innerHTML='';
  if(t==='url'){mi.type='url';mi.placeholder='https://example.com';lb.textContent='웹 주소';}
  else if(t==='text'){mi.type='text';mi.placeholder='전달할 텍스트를 입력하세요';lb.textContent='텍스트 내용';}
  else{mi.type='email';mi.placeholder='hello@example.com';lb.textContent='이메일 주소';
    ex.innerHTML='<div class="field"><label class="field-label">제목 (선택)</label><input id="email-subject" type="text" placeholder="이메일 제목" /></div><div class="field"><label class="field-label">본문 (선택)</label><textarea id="email-body" placeholder="이메일 본문"></textarea></div>';}
  mi.value='';
  document.getElementById('result-card').classList.remove('show');
  hideError();
}

function buildContent(){
  var main=document.getElementById('main-input').value.trim();
  if(!main)return null;
  if(currentType==='url'||currentType==='text')return main;
  var subj=(document.getElementById('email-subject')||{value:''}).value.trim();
  var body=(document.getElementById('email-body')||{value:''}).value.trim();
  var m='mailto:'+main;
  var p=[];
  if(subj)p.push('subject='+encodeURIComponent(subj));
  if(body)p.push('body='+encodeURIComponent(body));
  if(p.length)m+='?'+p.join('&');
  return m;
}

function showError(msg){var e=document.getElementById('error-msg');e.textContent=msg;e.classList.add('show');}
function hideError(){document.getElementById('error-msg').classList.remove('show');}

function generateQR(){
  hideError();
  var content=buildContent();
  if(!content){showError('내용을 입력해 주세요.');return;}
  var size=parseInt(document.getElementById('size-range').value);
  var color=document.getElementById('qr-color').value;
  var canvas=document.getElementById('qr-canvas');

  try{
    // typeNumber 자동 결정
    var typeNum=1;
    for(var t=1;t<=40;t++){
      var cap=QRUtil.getLengthInBits(4,t);
      if(content.length*8<=cap*QRRSBlock.getRSBlocks(t,2)[0].dataCount){typeNum=t;break;}
    }
    // 간단히 typeNumber 추정 (데이터 크기 기반)
    var len=content.length;
    if(len<=17)typeNum=1;
    else if(len<=32)typeNum=2;
    else if(len<=53)typeNum=3;
    else if(len<=78)typeNum=4;
    else if(len<=106)typeNum=5;
    else if(len<=134)typeNum=6;
    else if(len<=154)typeNum=7;
    else if(len<=192)typeNum=8;
    else if(len<=230)typeNum=9;
    else if(len<=271)typeNum=10;
    else typeNum=15;

    var qr=new QRCode(content,2);
    qr.typeNumber=typeNum;
    qr.makeImpl(false,qr.getBestMaskPattern());

    var mc=qr.getModuleCount();
    var margin=4;
    var cell=Math.floor((size-margin*2)/mc);
    var total=cell*mc+margin*2;
    canvas.width=total;
    canvas.height=total;
    var ctx=canvas.getContext('2d');
    ctx.fillStyle='#ffffff';
    ctx.fillRect(0,0,total,total);
    ctx.fillStyle=color;
    for(var r=0;r<mc;r++){
      for(var c=0;c<mc;c++){
        if(qr.isDark(r,c)){
          ctx.fillRect(margin+c*cell,margin+r*cell,cell,cell);
        }
      }
    }
    qrData=content;
    document.getElementById('qr-label').textContent=content.length>70?content.slice(0,70)+'…':content;
    document.getElementById('result-card').classList.add('show');
  }catch(err){
    showError('QR 생성 오류: '+err.message);
  }
}

function downloadQR(){
  var canvas=document.getElementById('qr-canvas');
  var a=document.createElement('a');
  a.download='qrcode.png';
  a.href=canvas.toDataURL('image/png');
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

function copyQR(){
  var canvas=document.getElementById('qr-canvas');
  canvas.toBlob(function(blob){
    try{navigator.clipboard.write([new ClipboardItem({'image/png':blob})]).catch(function(){alert('복사 실패: 브라우저가 지원하지 않습니다.');});}
    catch(e){alert('복사 실패: 브라우저가 지원하지 않습니다.');}
  });
}
